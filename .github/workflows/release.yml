name: Release

# Tag v* (matching apps/desktop/package.json's version, e.g. v0.1.0) to build
# installers with the bundled agent and publish them to a GitHub Release.
# electron-builder's github publisher creates/updates a draft release for the
# tag; review and publish it from the Releases page.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache-dependency-path: codehamr/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: build agent (GOEXPERIMENT=nogreenteagc)
        run: npm run agent:build
      - name: build app
        run: npm run build
      - name: package + publish NSIS installer
        run: npx electron-builder --win --publish always
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  macos:
    runs-on: macos-latest # arm64; dmg targets arm64 (see electron-builder.yml)
    # Run AFTER the windows job, not in parallel. electron-builder's github
    # publisher finds-or-creates a draft release by tag; two jobs publishing at
    # the same instant each fail to see the other's in-flight draft and create
    # their own → two drafts, same tag. Serializing means windows creates the
    # draft and macos appends its dmg/zip/latest-mac.yml to that same draft.
    needs: windows
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache-dependency-path: codehamr/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: build agent (GOEXPERIMENT=nogreenteagc)
        run: npm run agent:build
      - name: build app
        run: npm run build
      - name: package + publish dmg
        run: npx electron-builder --mac --publish always
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Apple signing + notarization, driven entirely by repo secrets:
          #   MAC_CERT_P12         base64 of the Developer ID Application .p12
          #   MAC_CERT_PASSWORD    the .p12 export password
          #   APPLE_ID             Apple ID email
          #   APPLE_APP_SPECIFIC_PASSWORD  from appleid.apple.com
          #   APPLE_TEAM_ID        10-char team id from the developer portal
          # With the secrets unset these env vars are empty strings, which
          # electron-builder treats as absent: the build stays unsigned and
          # auto-discovery is disabled so the runner keychain can't interfere.
          CSC_LINK: ${{ secrets.MAC_CERT_P12 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.MAC_CERT_P12 != '' && 'true' || 'false' }}
