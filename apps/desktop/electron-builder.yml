# electron-builder configuration. electron-vite bundles main/preload/renderer
# (dependencies included) into out/, so the package ships only that bundle —
# no node_modules — plus the codehamr agent binary as an extra resource.
appId: com.mashdup.codeanvil
productName: Anvil
directories:
  buildResources: build
  output: release
files:
  - out/**
  - package.json
asar: true
npmRebuild: false
# npm workspaces hoist electron to the repo root where electron-builder can't
# resolve the range; pin explicitly (keep in lockstep with the installed one).
electronVersion: 37.10.3

# The agent binary rides in resources/agent/; main's resolveBinary prefers it
# when the app is packaged. Built by `npm run agent:build` (pinned Go flags:
# GOEXPERIMENT=nogreenteagc — see PLAN.md §8).
win:
  icon: build/icon.png
  target:
    - target: nsis
      arch: [x64]
  extraResources:
    - from: ../../codehamr/dist/codehamr.exe
      to: agent/codehamr.exe
    # Bundled POSIX shell for the bash tool, so a packaged app needs no Git for
    # Windows. Fetched by `npm run fetch:busybox` (busybox-w32 as sh.exe) before
    # packaging; the agent finds it via CODEHAMR_SHELL (see main's resolveShell).
    - from: build/shell/sh.exe
      to: shell/sh.exe
nsis:
  oneClick: true
  perMachine: false
  deleteAppDataOnUninstall: false

# macOS: built by the release workflow on a macos (arm64) runner. arm64 only:
# the agent binary is compiled on the runner for its host arch; an Intel dmg
# needs a second Go cross-build first (PLAN.md Phase 2 note). Signing +
# notarization happen when the release workflow finds the Apple secrets
# (CSC_LINK / APPLE_ID family); absent secrets, the build stays unsigned.
# zip target: electron-updater on macOS updates from the zip, not the dmg.
mac:
  icon: build/icon.png
  category: public.app-category.developer-tools
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  gatekeeperAssess: false
  target:
    - target: dmg
      arch: [arm64]
    - target: zip
      arch: [arm64]
  extraResources:
    - from: ../../codehamr/dist/codehamr
      to: agent/codehamr

# Linux: built by the release workflow on an ubuntu (x64) runner. No bundled
# shell (a real /bin/sh is always present, so resolveShell returns null and the
# agent uses the system shell) and no signing. AppImage is the portable target
# electron-updater can update from (latest-linux.yml); the agent binary lands
# in resources/agent/codehamr, exactly where resolveBinary looks on non-Windows.
linux:
  icon: build/icon.png
  category: Development
  target:
    - target: AppImage
      arch: [x64]
  extraResources:
    - from: ../../codehamr/dist/codehamr
      to: agent/codehamr

# Where releases land; also baked into the app for a future electron-updater
# (P6). CI publishes on v* tags with GH_TOKEN; local builds never publish.
publish:
  provider: github
  owner: mashdup
  repo: CodeAnvil
